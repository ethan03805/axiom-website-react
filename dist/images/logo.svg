<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <!-- Axiom Logo: Stylized "A" mark with node connections + wordmark -->
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Mark: Stylized A with orbital nodes -->
  <g transform="translate(8, 8)">
    <!-- Central A shape -->
    <path d="M32 4 L8 60 L16 60 L21 48 L43 48 L48 60 L56 60 L32 4Z M32 16 L40 40 L24 40 Z" fill="url(#tealGrad)"/>

    <!-- Orbital ring -->
    <ellipse cx="32" cy="34" rx="28" ry="18" stroke="#14B8A6" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4 3"/>

    <!-- Connection nodes -->
    <circle cx="8" cy="28" r="3.5" fill="#14B8A6" opacity="0.9"/>
    <circle cx="56" cy="28" r="3.5" fill="#2DD4BF" opacity="0.9"/>
    <circle cx="32" cy="56" r="3.5" fill="#14B8A6" opacity="0.7"/>
    <circle cx="18" cy="16" r="2.5" fill="#2DD4BF" opacity="0.6"/>
    <circle cx="46" cy="16" r="2.5" fill="#14B8A6" opacity="0.6"/>

    <!-- Connection lines between nodes -->
    <line x1="8" y1="28" x2="18" y2="16" stroke="#14B8A6" stroke-width="1" opacity="0.3"/>
    <line x1="56" y1="28" x2="46" y2="16" stroke="#14B8A6" stroke-width="1" opacity="0.3"/>
    <line x1="18" y1="16" x2="46" y2="16" stroke="#14B8A6" stroke-width="1" opacity="0.2"/>
    <line x1="8" y1="28" x2="32" y2="56" stroke="#14B8A6" stroke-width="1" opacity="0.2"/>
    <line x1="56" y1="28" x2="32" y2="56" stroke="#14B8A6" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Wordmark: AXIOM -->
  <g transform="translate(88, 18)">
    <text font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" letter-spacing="8" fill="#F5F5F5">
      AXIOM
    </text>
  </g>
</svg>

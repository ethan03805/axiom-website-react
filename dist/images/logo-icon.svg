<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Axiom Icon: Stylized A with orbital nodes on dark background -->
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="510" height="510" rx="95" fill="none" stroke="#1E1E1E" stroke-width="2"/>

  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Central A shape -->
    <path d="M0 -160 L-120 120 L-80 120 L-55 60 L55 60 L80 120 L120 120 L0 -160Z M0 -80 L40 40 L-40 40 Z" fill="url(#tealGrad)"/>
  </g>

  <g transform="translate(256, 256)">
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="170" ry="100" stroke="#14B8A6" stroke-width="2.5" fill="none" opacity="0.3" stroke-dasharray="12 8"/>

    <!-- Connection nodes -->
    <circle cx="-150" cy="-30" r="14" fill="#14B8A6" opacity="0.9" filter="url(#nodeGlow)"/>
    <circle cx="150" cy="-30" r="14" fill="#2DD4BF" opacity="0.9" filter="url(#nodeGlow)"/>
    <circle cx="0" cy="100" r="14" fill="#14B8A6" opacity="0.7" filter="url(#nodeGlow)"/>
    <circle cx="-80" cy="-90" r="10" fill="#2DD4BF" opacity="0.6"/>
    <circle cx="80" cy="-90" r="10" fill="#14B8A6" opacity="0.6"/>

    <!-- Node inner dots -->
    <circle cx="-150" cy="-30" r="5" fill="#0A0A0A" opacity="0.6"/>
    <circle cx="150" cy="-30" r="5" fill="#0A0A0A" opacity="0.6"/>
    <circle cx="0" cy="100" r="5" fill="#0A0A0A" opacity="0.6"/>

    <!-- Connection lines -->
    <line x1="-150" y1="-30" x2="-80" y2="-90" stroke="#14B8A6" stroke-width="2" opacity="0.25"/>
    <line x1="150" y1="-30" x2="80" y2="-90" stroke="#14B8A6" stroke-width="2" opacity="0.25"/>
    <line x1="-80" y1="-90" x2="80" y2="-90" stroke="#14B8A6" stroke-width="2" opacity="0.15"/>
    <line x1="-150" y1="-30" x2="0" y2="100" stroke="#14B8A6" stroke-width="2" opacity="0.15"/>
    <line x1="150" y1="-30" x2="0" y2="100" stroke="#14B8A6" stroke-width="2" opacity="0.15"/>
  </g>
</svg>
